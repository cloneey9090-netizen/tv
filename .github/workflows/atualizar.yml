name: Atualizador Automatico da TV

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  atualizar-lista:
    runs-on: ubuntu-latest

    steps:
    - name: Baixando os arquivos do repositorio
      uses: actions/checkout@v4

    - name: Configurando o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalandos as ferramentas do robo
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Rodando o Robo Raspador
      run: python robo.py

    - name: Salvando as alteracoes na lista.txt e na bussola
      run: |
        git config --global user.name "Robo da TV"
        git config --global user.email "robo@tv.com"
        git add lista.txt config.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Lista e Bússola atualizadas" && git push)
