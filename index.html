
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV COMUNIDADE - ARRANCADA RÁPIDA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: #000; border-bottom: 2px solid #ff9900; height: 120px; display: flex; width: 100%; flex-shrink: 0; }
        #espaco-selo-3d { width: 50%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; background: #000; border-right: 1px solid #222; }
        #banner-container { width: 50%; height: 100%; position: relative; overflow: hidden; background: #050505; }
        .promo-slide { height: 100%; width: 100%; display: none; position: absolute; top: 0; left: 0; object-fit: fill; animation: fade 1s; }
        @keyframes fade { from {opacity: .4} to {opacity: 1} }
        #main { display: flex; flex: 1; flex-direction: column; overflow: hidden; } 
        #player { width: 100%; aspect-ratio: 16 / 9; background: #000; flex-shrink: 0; }
        #canais { flex: 1; background: #111; overflow-y: auto; display: flex; flex-direction: column; padding: 5px; }
        .canal { padding: 15px; border-bottom: 1px solid #222; cursor: pointer; font-weight: bold; }
        .canal:hover { background: #ff9900; color: #000; }
        
        .btn-youtube { background: #ff0000; color: #fff; padding: 15px; border: none; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; border-radius: 5px; margin-bottom: 10px; font-size: 16px; width: 100%; }
        .btn-youtube i { margin-right: 10px; font-size: 20px; }
        
        .btn-config { background: #333; color: #ff9900; border: 1px solid #ff9900; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 5px; margin-bottom: 10px; font-size: 14px; width: 100%; text-align: center; }
        .btn-config:hover { background: #ff9900; color: #000; }

        #painel-externo { display: none; background: #222; border: 4px solid #ff9900; padding: 15px; margin: 10px 0; border-radius: 10px; text-align: center; }
        #url-input { width: 90%; padding: 12px; margin-bottom: 10px; border-radius: 5px; border: none; font-size: 16px; text-align: center; background: #000; color: #fff; border: 1px solid #ff9900; }
        .btn-salvar { background: #ff9900; color: #000; padding: 12px 25px; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; font-size: 16px; width: 100%; }
        .btn-limpar { background: #444; color: #fff; padding: 8px; border: none; font-size: 12px; margin-top: 15px; cursor: pointer; border-radius: 5px; width: 100%; }

        /* FIX DA TELA CHEIA BRUTA: Força o container e os elementos internos do Clappr a ocuparem tudo */
        .video-expandido { position: fixed !important; top: 0 !important; left: 0 !important; width: 100vw !important; height: 100vh !important; z-index: 9999 !important; background: #000; }
        .video-expandido .clappr-player, .video-expandido video, .video-expandido .player-poster { width: 100vw !important; height: 100vh !important; }

        .tela-bloqueio { background: url('https://i.gifer.com/76bX.gif') repeat; height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; color: #ff9900; position: fixed; top: 0; left: 0; width: 100vw; z-index: 99999; }
        .caixa-erro { background: rgba(0, 0, 0, 0.85); padding: 30px; border: 3px solid #ff9900; border-radius: 10px; box-shadow: 0 0 20px #ff9900; font-family: monospace; }

        @media (min-width: 800px) {
            #main { flex-direction: row; height: calc(100vh - 120px); }
            #player { width: 75%; height: 100%; position: sticky; top: 0; }
            #canais { height: 100%; overflow-y: auto; width: 25%; }
        }
    </style>
</head>
<body>

<header id="cabecalho">
    <div id="espaco-selo-3d">
        <img id="minha-logo-3d" src="https://i.postimg.cc/PqKbmKV5/0514.gif" style="height: 70%; object-fit: contain; position: absolute; opacity: 0.8;">
        <div style="color: #ff9900; font-size: 12px; font-weight: bold; z-index: 2; text-shadow: 2px 2px 4px #000; margin-top: 50px;">TV COMUNIDADE</div>
    </div>
    <div id="banner-container"></div>
</header>

<div id="main">
    <div id="player" onclick="toggleSmartFull()"></div> 
    <div id="canais">
        <button class="btn-config" onclick="togglePainelExterno()"><i class="fas fa-cog"></i> CONFIGURAR MINHA LISTA</button>

        <div id="painel-externo">
            <b style="color: #ff9900; font-size: 18px;">ADICIONAR LISTA NOVA</b><br><br>
            <input type="text" id="url-input" placeholder="Cole o link da lista m3u aqui...">
            <button class="btn-salvar" onclick="salvarListaExterna()">✅ SALVAR E RODAR</button>
            <button class="btn-limpar" onclick="limparLista()">❌ VOLTAR À LISTA PADRÃO</button>
        </div>

        <button class="btn-youtube" onclick="abrirYoutube()">
            <i class="fab fa-youtube"></i> ABRIR YOUTUBE NO PLAYER
        </button>
        
        <div id="lista-canais"></div>
    </div> 
</div>

<script>
    // 🛡️ TRANCA DE DOMÍNIO ORIGINAL
    if (!window.location.hostname.includes("github.io") && window.location.hostname !== "localhost") {
        document.body.innerHTML = `
            <div class="tela-bloqueio">
                <div class="caixa-erro">
                    <h1 style="margin:0 0 10px 0; font-size: 28px;">⚠️ NAVEGADOR NÃO SUPORTADO</h1>
                    <p style="color:#fff; margin:0; font-size: 16px;">SISTEMA BLOQUEADO - TV COMUNIDADE</p>
                </div>
            </div>
        `;
        window.stop();
    }

    const urlListaPadrao = "lista.txt"; 
    let imagens = [];
    let slideIndex = 0;
    let listaDeVideos = [];
    let indiceAtual = 0;
    let clapprPlayer;

    function togglePainelExterno() {
        const painel = document.getElementById("painel-externo");
        painel.style.display = (painel.style.display === "block") ? "none" : "block";
    }

    function salvarListaExterna() {
        let url = document.getElementById('url-input').value.trim();
        if(url) {
            localStorage.setItem('lista_custom_comandante', url);
            alert("Lista externa salva! Inicializando motor remoto...");
            location.reload();
        }
    }

    function limparLista() {
        localStorage.removeItem('lista_custom_comandante');
        alert("Retornando para a lista padrão da comunidade.");
        location.reload();
    }

    function iniciarPlayer(link) {
        if (clapprPlayer) clapprPlayer.destroy();
        
        let canalAtual = listaDeVideos[indiceAtual];
        let mutarAtivo = false;
        
        if (canalAtual && canalAtual.nome.toUpperCase().includes("AUTO")) {
            mutarAtivo = true;
        }

        clapprPlayer = new Clappr.Player({ 
            parentId: "#player", source: link, width: "100%", height: "100%", autoPlay: true, mute: mutarAtivo 
        });

        clapprPlayer.on(Clappr.Events.PLAYER_ENDED, function() {
            let canalFinalizado = listaDeVideos[indiceAtual];
            if (canalFinalizado && canalFinalizado.nome.toUpperCase().includes("AUTO")) {
                indiceAtual++;
                if (indiceAtual >= listaDeVideos.length) indiceAtual = 0;
                executarCanal(listaDeVideos[indiceAtual]);
            } else {
                clapprPlayer.play();
            }
        });
    }

    function abrirYoutube() {
        const playerDiv = document.getElementById("player");
        if (clapprPlayer) clapprPlayer.destroy();
        playerDiv.innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/videoseries?list=PLrEnWoR732-BHrPp_Pm8_VleD68f9s14-" frameborder="0" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>`;
    }

    function executarCanal(canalObj) {
        const playerDiv = document.getElementById("player");
        if (canalObj.link.includes("youtube.com")) {
            if (clapprPlayer) clapprPlayer.destroy();
            let urlEmbed = canalObj.link.replace("watch?v=", "embed/");
            playerDiv.innerHTML = `<iframe width="100%" height="100%" src="${urlEmbed}?autoplay=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
        } else {
            if (playerDiv.querySelector("iframe")) playerDiv.innerHTML = "";
            if (!document.querySelector(".clappr-video")) {
                iniciarPlayer(canalObj.link);
            } else {
                if (canalObj.nome.toUpperCase().includes("AUTO")) {
                    clapprPlayer.mute();
                } else {
                    clapprPlayer.unmute();
                    clapprPlayer.setVolume(100);
                }
                clapprPlayer.load(canalObj.link);
                clapprPlayer.play();
            }
        }
    }

    function toggleSmartFull() {
        const p = document.getElementById('player');
        p.classList.toggle('video-expandido');
        
        document.getElementById('cabecalho').style.display = p.classList.contains('video-expandido') ? 'none' : 'flex';
        document.getElementById('canais').style.display = p.classList.contains('video-expandido') ? 'none' : 'flex';
        
        if (clapprPlayer) {
            setTimeout(() => {
                clapprPlayer.resize({width: "100%", height: "100%"});
            }, 100);
        }
    }

    async function carregarTV() {
        let data = "";
        const listaExterna = localStorage.getItem('lista_custom_comandante');

        if (!listaExterna) {
            try {
                const res = await fetch(urlListaPadrao + "?t=" + new Date().getTime());
                data = await res.text();
                processarDados(data);
            } catch(e) {
                console.error(e);
                document.getElementById('lista-canais').innerHTML = "<p style='color:red; padding:10px;'>Erro ao carregar canais padrão.</p>";
            }
            return;
        }

        try {
            document.getElementById('lista-canais').innerHTML = "<p style='color:orange; padding:10px;'>Conectando à lista externa...</p>";
            const finalUrl = "https://api.allorigins.win/raw?url=" + encodeURIComponent(listaExterna);
            const res = await fetch(finalUrl);
            if(res.ok) {
                data = await res.text();
                processarDados(data);
            } else {
                throw new Error("Erro na resposta do servidor proxy");
            }
        } catch(e) { 
            console.error(e);
            alert("Link remoto falhou ou bloqueou! Voltando para os canais padrão.");
            limparLista();
        }
    }

    function processarDados(textoLista) {
        // CORREÇÃO ESSENCIAL: Garante a quebra de linha limpando resíduos de \r do Windows
        const linhas = textoLista.split(/\r?\n/);
        const menu = document.getElementById('lista-canais');
        const container = document.getElementById('banner-container');
        
        menu.innerHTML = ""; 
        listaDeVideos = [];
        imagens = [];
        container.innerHTML = "";
        
        let nomeTemp = "Canal";

        linhas.forEach(l => {
            const static_line = l.trim();
            if(static_line.startsWith('IMG=')) {
                const img = document.createElement('img');
                img.src = static_line.replace('IMG=', '');
                img.className = 'promo-slide';
                container.appendChild(img);
                imagens.push(img);
            }
            if(static_line.includes("#EXTINF")) { nomeTemp = static_line.split(',')[1] || "Canal"; }
            else if(static_line.startsWith("http")) {
                let infoCanal = { nome: nomeTemp, link: static_line };
                listaDeVideos.push(infoCanal);
                let meuIndice = listaDeVideos.length - 1;
                
                if (meuIndice === 0) {
                    indiceAtual = 0;
                    iniciarPlayer(static_line);
                }
                
                const div = document.createElement('div');
                div.className = 'canal';
                div.innerHTML = "▶️ " + nomeTemp;
                div.onclick = (e) => { 
                    e.stopPropagation(); 
                    indiceAtual = meuIndice; 
                    executarCanal(infoCanal);
                };
                menu.appendChild(div);
            }
        });
        if(imagens.length > 0) showSlides();
    }

    function showSlides() {
        imagens.forEach(img => img.style.display = "none");
        slideIndex++;
        if (slideIndex > imagens.length) slideIndex = 1;
        if (imagens[slideIndex-1]) imagens[slideIndex-1].style.display = "block";
        setTimeout(showSlides, 8000); 
    }
    
    carregarTV();
</script>
</body>
</html>
