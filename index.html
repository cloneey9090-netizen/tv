<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV COMUNIDADE</title>
    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        
        header { 
            background: #000; 
            border-bottom: 2px solid #ff9900; 
            height: 120px; 
            display: flex; 
            width: 100%; 
            overflow: hidden;
        }

        /* LADO ESQUERDO: SEU CONTATO */
        #fixo-contato {
            width: 40%;
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 5px;
            border-right: 1px solid #333;
        }

        /* LADO DIREITO: PROPAGANDA */
        #banner-container { 
            width: 60%; 
            height: 100%; 
            position: relative;
            overflow: hidden;
            background: #050505;
        }

        .promo-slide { 
            height: 100%; 
            width: 100%; 
            display: none; 
            position: absolute;
            top: 0;
            left: 0;
            object-fit: contain; 
            animation: fade 1s; 
        }

        @keyframes fade { from {opacity: .4} to {opacity: 1} }

        #main { display: flex; flex: 1; flex-direction: column; } 
        #player { width: 100%; aspect-ratio: 16 / 9; background: #000; flex-shrink: 0; cursor: pointer; }
        #canais { flex: 1; background: #111; overflow-y: auto; min-height: 300px; }
        .canal { padding: 15px; border-bottom: 1px solid #222; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .canal:hover { background: #ff9900; color: #000; }

        @media (min-width: 800px) {
            #main { flex-direction: row; overflow: hidden; height: calc(100vh - 120px); }
            #canais { width: 350px; flex-shrink: 0; border-left: 1px solid #333; }
            #player { flex: 1; height: 100%; }
        }
    </style>
</head>
<body>

<header>
    <div id="fixo-contato">
        <div style="color: #ff9900; font-size: 14px; margin-bottom: 5px; font-weight: bold;">ANUNCIE AQUI</div>
        <div style="color: #25D366; font-size: 18px; font-weight: bold;">📲 (28) 98804-9598</div>
        <div style="font-size: 10px; color: #ccc; margin-top: 5px;">Sua marca em Cachoeiro</div>
    </div>

    <div id="banner-container"></div>
</header>

<div id="main">
    <div id="player" onclick="toggleFullScreen()"></div> 
    <div id="canais"></div> 
</div>

<script>
    const urlLista = "lista.txt"; 
    let imagens = [];
    let slideIndex = 0;
    let listaDeVideos = [];
    let indiceAtual = 0;

    var player = new Clappr.Player({ 
        parentId: "#player", 
        source: "", 
        width: '100%', 
        height: '100%', 
        autoPlay: true,
        mute: true 
    });

    player.on(Clappr.Events.PLAYER_ENDED, function() {
        let canalAtual = listaDeVideos[indiceAtual];
        if (canalAtual && canalAtual.nome.toUpperCase().includes("AUTO")) {
            indiceAtual++;
            if (indiceAtual >= listaDeVideos.length) indiceAtual = 0;
            player.load(listaDeVideos[indiceAtual].link);
            player.play();
        } else {
            player.play();
        }
    });

    function toggleFullScreen() {
        const p = document.getElementById('player');
        if (!document.fullscreenElement) {
            if (p.requestFullscreen) p.requestFullscreen();
            else if (p.webkitRequestFullscreen) p.webkitRequestFullscreen();
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
        }
    }

    async function carregarTV() {
        try {
            const res = await fetch(urlLista + "?t=" + new Date().getTime());
            const data = await res.text();
            const linhas = data.split('\n');
            const menu = document.getElementById('canais');
            const container = document.getElementById('banner-container');
            let nomeTemp = "Canal";

            linhas.forEach(l => {
                const linha = l.trim();
                if(linha.startsWith('IMG=')) {
                    const img = document.createElement('img');
                    img.src = linha.replace('IMG=', '');
                    img.className = 'promo-slide';
                    container.appendChild(img);
                    imagens.push(img);
                }
                if(linha.includes("#EXTINF")) { 
                    nomeTemp = linha.split(',')[1] || "Canal"; 
                }
                else if(linha.startsWith("http")) {
                    let infoCanal = { nome: nomeTemp, link: linha };
                    listaDeVideos.push(infoCanal);
                    let meuIndice = listaDeVideos.length - 1;

                    if (meuIndice === 0) {
                        player.load(linha);
                    }

                    const div = document.createElement('div');
                    div.className = 'canal';
                    div.innerHTML = "▶️ " + nomeTemp;

                    div.onclick = (e) => { 
                        e.stopPropagation();
                        player.setVolume(100); 
                        indiceAtual = meuIndice;
                        player.load(linha);
                        player.play(); 
                        if(window.innerWidth < 800) window.scrollTo({top: 0, behavior: 'smooth'});
                    };
                    menu.appendChild(div);
                }
            });
            if(imagens.length > 0) showSlides();
        } catch(e) {
            console.error("Erro:", e);
        }
    }

    function showSlides() {
        if (imagens.length === 0) return;
        imagens.forEach(img => img.style.display = "none");
        slideIndex++;
        if (slideIndex > imagens.length) slideIndex = 1;
        imagens[slideIndex-1].style.display = "block";
        setTimeout(showSlides, 10000); 
    }

    carregarTV();
</script>
</body>
</html>
