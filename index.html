<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV COMUNIDADE CACHOEIRO</title>
    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #ff9900; color: #000; padding: 12px; text-align: center; font-weight: bold; border-bottom: 2px solid #fff; }
        #main { display: flex; flex: 1; overflow: hidden; }
        #canais { width: 30%; max-width: 250px; background: #111; overflow-y: auto; border-right: 1px solid #333; }
        .canal { padding: 15px; border-bottom: 1px solid #222; cursor: pointer; font-size: 14px; }
        .canal:hover { background: #333; color: #ff9900; border-left: 5px solid #ff9900; }
        #player { flex: 1; background: #000; }
    </style>
</head>
<body>
<header id="banner">📢 BEM-VINDO À TV COMUNIDADE CACHOEIRO</header>
<div id="main">
    <div id="canais"></div>
    <div id="player"></div>
</div>
<script>
    const urlLista = "lista.txt"; 
    var player = new Clappr.Player({
        parentId: "#player", source: "", width: '100%', height: '100%', autoPlay: true
    });
    async function ligarTV() {
        try {
            const res = await fetch(urlLista);
            const data = await res.text();
            const linhas = data.split('\n');
            const menu = document.getElementById('canais');
            const topo = document.getElementById('banner');
            menu.innerHTML = '';
            let nome = "";
            linhas.forEach(l => {
                const linha = l.trim();
                if(linha.startsWith('###')) topo.innerText = "📢 " + linha.replace('###', '');
                else if(linha.includes("#EXTINF")) nome = linha.split(',')[1] || "Canal";
                else if(linha.startsWith("http")) {
                    const div = document.createElement('div');
                    div.className = 'canal';
                    div.innerText = "📺 " + nome;
                    div.onclick = () => { player.load(linha); player.play(); };
                    menu.appendChild(div);
                }
            });
        } catch (e) { console.log("Erro no sinal"); }
    }
    ligarTV();
</script>
</body>
</html>
