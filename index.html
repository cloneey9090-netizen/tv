<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV COMUNIDADE</title>
    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow: hidden; }
        
        header { background: #000; padding: 5px; text-align: center; border-bottom: 2px solid #ff9900; height: 100px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        
        #banner-container { width: 100%; height: 100%; overflow: hidden; }
        .promo-slide { height: 100%; max-width: 100%; display: none; margin: 0 auto; object-fit: contain; animation: fade 1s; }
        @keyframes fade { from {opacity: .4} to {opacity: 1} }

        #main { display: flex; flex: 1; flex-direction: row; overflow: hidden; height: calc(100vh - 100px); background: #000; }
        
        /* PLAYER: Adicionei o z-index para ele não sumir */
        #player { flex: 1; height: 100%; background: #000; cursor: pointer; position: relative; z-index: 10; }
        
        #canais { width: 250px; flex-shrink: 0; background: #111; overflow-y: auto; border-left: 1px solid #222; z-index: 5; }
        
        .canal { padding: 15px; border-bottom: 1px solid #222; cursor: pointer; font-weight: bold; font-size: 14px; }
        .canal:hover { background: #ff9900; color: #000; }

        @media (max-width: 800px) {
            #main { flex-direction: column; overflow-y: auto; height: auto; }
            #player { width: 100%; aspect-ratio: 16 / 9; flex: none; }
            #canais { width: 100%; height: auto; flex: 1; border-left: none; }
            body { overflow: auto; }
        }
    </style>
</head>
<body>

<header>
    <div id="banner-container"></div>
</header>

<div id="main">
    <div id="player" onclick="toggleFullScreen()"></div> 
    <div id="canais"></div> 
</div>

<script>
    const urlLista = "lista.txt"; 
    
    var player = new Clappr.Player({ 
        parentId: "#player", 
        source: "", 
        width: '100%', 
        height: '100%', 
        autoPlay: true,
        playInline: true
    });

    // Função para ampliar ao clicar no vídeo
    function toggleFullScreen() {
        const playerElement = document.querySelector('#player');
        if (!document.fullscreenElement) {
            if (playerElement.requestFullscreen) { playerElement.requestFullscreen(); }
            else if (playerElement.webkitRequestFullscreen) { playerElement.webkitRequestFullscreen(); }
        } else {
            if (document.exitFullscreen) { document.exitFullscreen(); }
        }
    }

    let imagens = [];
    let slideIndex = 0;

    async function carregarTV() {
        try {
            const res = await fetch(urlLista + "?t=" + new Date().getTime());
            const data = await res.text();
            const linhas = data.split('\n');
            const menu = document.getElementById('canais');
            const container = document.getElementById('banner-container');
            
            let nome = "Canal";

            linhas.forEach(l => {
                const linha = l.trim();
                if(linha.startsWith('IMG=')) {
                    const img = document.createElement('img');
                    img.src = linha.replace('IMG=', '');
                    img.className = 'promo-slide';
                    container.appendChild(img);
                    imagens.push(img);
                }
                if(linha.includes("#EXTINF")) { 
                    nome = linha.split(',')[1] || "Canal"; 
                }
                else if(linha.startsWith("http")) {
                    const div = document.createElement('div');
                    div.className = 'canal';
                    div.innerHTML = "▶️ " + nome;
                    div.onclick = (e) => { 
                        e.stopPropagation(); 
                        player.load(linha); 
                        player.play(); 
                    };
                    menu.appendChild(div);
                }
            });
            if(imagens.length > 0) showSlides();
        } catch(e) {
            console.error("Erro na carga:", e);
        }
    }

    function showSlides() {
        if (imagens.length === 0) return;
        imagens.forEach(img => img.style.display = "none");
        slideIndex++;
        if (slideIndex > imagens.length) {slideIndex = 1}
        imagens[slideIndex-1].style.display = "block";
        setTimeout(showSlides, 20000); 
    }
    carregarTV();
</script>
</body>
</html>
