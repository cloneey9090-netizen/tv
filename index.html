<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="icon" href="https://i.postimg.cc/PqKbmKV5/0514.gif" type="image/gif">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV COMUNIDADE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3940256099942544" crossorigin="anonymous"></script>

    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: #000; border-bottom: 2px solid #ff9900; height: 120px; display: flex; width: 100%; flex-shrink: 0; }
        
        /* LADO ESQUERDO: SEU SELO 3D */
        #espaco-selo-3d { width: 50%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; background: #000; }
        
        /* LADO DIREITO: ONDE MORAM OS BANNERS E O GOOGLE */
        #banner-container { width: 50%; height: 100%; position: relative; overflow: hidden; background: #050505; }
        
        .promo-slide { height: 100%; width: 100%; display: none; position: absolute; top: 0; left: 0; object-fit: fill; animation: fade 1s; }
        
        /* Estilo para o bloco do Google não amassar o topo */
        .google-box { width: 100%; height: 100%; display: none; position: absolute; top: 0; left: 0; }

        @keyframes fade { from {opacity: .4} to {opacity: 1} }
        
        #main { display: flex; flex: 1; flex-direction: column; overflow: hidden; } 
        #player { width: 100%; aspect-ratio: 16 / 9; background: #000; flex-shrink: 0; }
        #canais { flex: 1; background: #111; overflow-y: auto; display: flex; flex-direction: column; padding: 5px; }
        .canal { padding: 15px; border-bottom: 1px solid #222; cursor: pointer; font-weight: bold; }
        .canal:hover { background: #ff9900; color: #000; }
        .btn-youtube { background: #ff0000; color: #fff; padding: 15px; border: none; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; border-radius: 5px; margin-bottom: 10px; font-size: 16px; width: 100%; }
        .btn-youtube i { margin-right: 10px; font-size: 20px; }
        .video-expandido { position: fixed !important; top: 0 !important; left: 0 !important; width: 100vw !important; height: 100vh !important; z-index: 9999; background: #000; }
        
        @media (min-width: 800px) {
            #main { flex-direction: row; height: calc(100vh - 120px); }
            #player { width: 75%; height: 100%; position: sticky; top: 0; }
            #canais { height: 100%; overflow-y: auto; width: 25%; }
        }
    </style>
</head>
<body>

<header id="cabecalho">
    <div id="espaco-selo-3d">
        <img src="https://i.postimg.cc/PqKbmKV5/0514.gif" style="height: 100%; width: 150%; object-fit: contain;">
    </div>
    
    <div id="banner-container">
        
        <div id="bloco-google-admob" class="google-box">
            <ins class="adsbygoogle"
                 style="display:inline-block;width:100%;height:120px"
                 data-ad-client="ca-pub-3940256099942544" 
                 data-ad-slot="6300978111"></ins>
        </div>

    </div>
</header>

<div id="main">
    <div id="player" onclick="toggleSmartFull()"></div> 
    <div id="canais">
        <button class="btn-youtube" onclick="abrirYoutube()">
            <i class="fab fa-youtube"></i> ABRIR YOUTUBE NO PLAYER
        </button>
        <div id="lista-canais"></div>
    </div> 
</div>

<script>
    // 🛡️ TRANCA DE DOMÍNIO DO COMANDANTE
    if (!window.location.hostname.includes("github.io") && window.location.hostname !== "localhost") {
        document.body.innerHTML = "<div style='background:#000;color:#ff9900;height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;'><h1>ACESSO RESTRITO<br>TV COMUNIDADE</h1></div>";
    }

    const urlLista = "lista.txt"; 
    let imagens = [];
    let slideIndex = 0;
    let listaDeVideos = [];
    let indiceAtual = 0;
    let clapprPlayer;
    
    // Controlador do Rodízio (Alterna entre imagem local e anúncio do Google)
    let rodadaDoGoogle = false;

    function iniciarPlayer(link) {
        if (clapprPlayer) clapprPlayer.destroy();
        clapprPlayer = new Clappr.Player({ 
            parentId: "#player", source: link, width: '100%', height: '100%', autoPlay: true, mute: true 
        });

        clapprPlayer.on(Clappr.Events.PLAYER_ENDED, function() {
            let canalAtual = listaDeVideos[indiceAtual];
            if (canalAtual && canalAtual.nome.toUpperCase().includes("AUTO")) {
                indiceAtual++;
                if (indiceAtual >= listaDeVideos.length) indiceAtual = 0;
                executarCanal(listaDeVideos[indiceAtual]);
            } else { clapprPlayer.play(); }
        });
    }

    function abrirYoutube() {
        const playerDiv = document.getElementById("player");
        if (clapprPlayer) clapprPlayer.destroy();
        playerDiv.innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/videoseries?list=PLrEnWoR732-BHrPp_Pm8_VleD68f9s14-" frameborder="0" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>`;
    }

    function ejecutarCanal(canalObj) {
        const playerDiv = document.getElementById("player");
        if (canalObj.link.includes("youtube.com")) {
            if (clapprPlayer) clapprPlayer.destroy();
            let urlEmbed = canalObj.link.replace("watch?v=", "embed/");
            playerDiv.innerHTML = `<iframe width="100%" height="100%" src="${urlEmbed}?autoplay=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
        } else {
            if (playerDiv.querySelector("iframe")) playerDiv.innerHTML = "";
            if (!document.querySelector(".clappr-video")) {
                iniciarPlayer(canalObj.link);
            } else { clapprPlayer.load(canalObj.link); }
            
            if (!canalObj.nome.toUpperCase().includes("AUTO")) {
                clapprPlayer.unmute(); clapprPlayer.setVolume(100);
            } else { clapprPlayer.mute(); }
            clapprPlayer.play();
        }
    }

    function toggleSmartFull() {
        const p = document.getElementById('player');
        const c = document.getElementById('cabecalho');
        const lista = document.getElementById('canais');
        p.classList.toggle('video-expandido');
        c.style.display = p.classList.contains('video-expandido') ? 'none' : 'flex';
        lista.style.display = p.classList.contains('video-expandido') ? 'none' : 'flex';
    }

    async function carregarTV() {
        try {
            const res = await fetch(urlLista + "?t=" + new Date().getTime());
            const data = await res.text();
            const linhas = data.split('\n');
            const menu = document.getElementById('lista-canais');
            const container = document.getElementById('banner-container');
            let nomeTemp = "Canal";

            linhas.forEach(l => {
                const alignment = l.trim();
                if(alignment.startsWith('IMG=')) {
                    const img = document.createElement('img');
                    img.src = alignment.replace('IMG=', '');
                    img.className = 'promo-slide';
                    container.appendChild(img);
                    imagens.push(img);
                }
                if(alignment.includes("#EXTINF")) { nomeTemp = alignment.split(',')[1] || "Canal"; }
                else if(alignment.startsWith("http")) {
                    let infoCanal = { nome: nomeTemp, link: alignment };
                    listaDeVideos.push(infoCanal);
                    let meuIndice = listaDeVideos.length - 1;
                    if (meuIndice === 0) iniciarPlayer(alignment);
                    const div = document.createElement('div');
                    div.className = 'canal';
                    div.innerHTML = "▶️ " + nomeTemp;
                    div.onclick = (e) => { 
                        e.stopPropagation(); indiceAtual = meuIndice; executarCanal(infoCanal);
                    };
                    menu.appendChild(div);
                }
            });
            
            // 🌟 Inicializa o anúncio do Google na memória
            try { (adsbygoogle = window.adsbygoogle || []).push({}); } catch(e) {}

            if(imagens.length > 0) showSlides();
        } catch(e) { console.error(e); }
    }

    // 🌟 3. O CRONÔMETRO DO RODÍZIO MODIFICADO (Mágica do equilíbrio)
    function showSlides() {
        const divGoogle = document.getElementById("bloco-google-admob");

        // Inverte a vez: se era local, vira Google; se era Google, vira local
        rodadaDoGoogle = !rodadaDoGoogle;

        if (rodadaDoGoogle) {
            // VEZ DO GOOGLE: Esconde todas as suas imagens locais e liga o bloco do AdMob
            imagens.forEach(img => img.style.display = "none");
            divGoogle.style.display = "block";
        } else {
            // VEZ DO COMANDANTE: Esconde o bloco do Google e liga a próxima imagem local
            divGoogle.style.display = "none";
            
            imagens.forEach(img => img.style.display = "none");
            slideIndex++;
            if (slideIndex > imagens.length) slideIndex = 1;
            imagens[slideIndex-1].style.display = "block";
        }

        // Mantém o tempo exato de troca a cada 10 segundos
        setTimeout(showSlides, 10000); 
    }
    carregarTV();
</script>
</body>
</html>
