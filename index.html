<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV COMUNIDADE</title>
    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <style>
        /* ORGANIZAÇÃO GERAL */
        body { 
            background: #000; 
            color: #fff; 
            font-family: sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* 1. BANNER NO TOPO (Sua Propaganda) */
        header { 
            background: #000; 
            padding: 0; 
            text-align: center; 
            border-bottom: 2px solid #ff9900; 
            height: 100px; /* Altura fixa para o banner respirar */
            flex-shrink: 0;
        }
        
        #banner-container { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .promo-slide { 
            height: 100%; 
            width: auto; 
            max-width: 100%;
            /* O SEGREDO: contain garante que o telefone NÃO corte */
            object-fit: contain; 
            display: none; 
            animation: fade 1s; 
        }

        @keyframes fade { from {opacity: .4} to {opacity: 1} }

        /* 2. ÁREA CENTRAL (Player e Canais) */
        #main { 
            display: flex; 
            flex: 1; 
            overflow: hidden; 
            flex-direction: column; /* No celular, o player fica em cima da lista */
        }

        #player { 
            width: 100%; 
            aspect-ratio: 16 / 9; /* Mantém o formato de TV */
            background: #000; 
            flex-shrink: 0;
        }

        #canais { 
            flex: 1; 
            background: #111; 
            overflow-y: auto; 
        }

        .canal { 
            padding: 15px; 
            border-bottom: 1px solid #222; 
            cursor: pointer; 
            font-weight: bold; 
        }

        .canal:hover { background: #ff9900; color: #000; }

        /* AJUSTE PARA SMART TV OU PC (Telas Grandes) */
        @media (min-width: 800px) {
            #main { flex-direction: row; } /* Player e Lista lado a lado na TV */
            #canais { width: 300px; }
            header { height: 130px; } /* Banner maior na TV */
        }
    </style>
</head>
<body>

<header>
    <div id="banner-container"></div>
</header>

<div id="main">
    <div id="player"></div> <div id="canais"></div> </div>

<script>
    const urlLista = "lista.txt";
    // Iniciamos o player vazio
    var player = new Clappr.Player({ parentId: "#player", source: "", width: '100%', height: '100%', autoPlay: true });
    let imagens = [];
    let slideIndex = 0;

    async function carregarTV() {
        try {
            const res = await fetch(urlLista);
            const data = await res.text();
            const linhas = data.split('\n');
            const menu = document.getElementById('canais');
            const container = document.getElementById('banner-container');
            
            let nome = "Canal sem nome";

            linhas.forEach(l => {
                const linha = l.trim();
                
                // Se for imagem de propaganda
                if(linha.startsWith('IMG=')) {
                    const img = document.createElement('img');
                    img.src = linha.replace('IMG=', '');
                    img.className = 'promo-slide';
                    container.appendChild(img);
                    imagens.push(img);
                }
                
                // Se for nome do canal
                if(linha.includes("#EXTINF")) { 
                    nome = linha.split(',')[1] || "Canal"; 
                }
                // Se for link do canal
                else if(linha.startsWith("http")) {
                    const div = document.createElement('div');
                    div.className = 'canal';
                    div.innerHTML = "▶️ " + nome;
                    div.onclick = () => { 
                        player.load(linha); 
                        player.play(); 
                        // Scroll suave para o player ao clicar no canal (bom para celular)
                        document.getElementById('player').scrollIntoView({behavior: "smooth"});
                    };
                    menu.appendChild(div);
                }
            });
            showSlides();
        } catch (error) {
            console.error("Erro ao carregar lista:", error);
        }
    }

    function showSlides() {
        if (imagens.length === 0) return;
        imagens.forEach(img => img.style.display = "none");
        slideIndex++;
        if (slideIndex > imagens.length) {slideIndex = 1}
        imagens[slideIndex-1].style.display = "block";
        
        // TEMPO: 20 segundos (20000ms) para carregar bem e o povo ler o telefone
        setTimeout(showSlides, 20000); 
    }

    carregarTV();
</script>
</body>
</html>
