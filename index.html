<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV COMUNIDADE</title>
    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        
        header { background: #000; padding: 5px; text-align: center; border-bottom: 2px solid #ff9900; height: 100px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        
        #banner-container { width: 100%; height: 100%; overflow: hidden; }
        .promo-slide { height: 100%; max-width: 100%; display: none; margin: 0 auto; object-fit: contain; animation: fade 1s; }
        @keyframes fade { from {opacity: .4} to {opacity: 1} }

        #main { display: flex; flex: 1; flex-direction: column; } 
        
        #player { width: 100%; aspect-ratio: 16 / 9; background: #000; flex-shrink: 0; cursor: pointer; }
        
        #canais { flex: 1; background: #111; overflow-y: auto; min-height: 300px; }
        
        .canal { padding: 15px; border-bottom: 1px solid #222; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .canal:hover { background: #ff9900; color: #000; }

        /* Ajuste para telas grandes (TV e PC) */
        @media (min-width: 800px) {
            #main { flex-direction: row; overflow: hidden; height: calc(100vh - 100px); }
            #canais { width: 350px; flex-shrink: 0; border-left: 1px solid #333; }
            #player { flex: 1; height: 100%; }
        }
    </style>
</head>
<body>

<header>
    <div id="banner-container"></div>
</header>

<div id="main">
    <div id="player" onclick="toggleFullScreen()"></div> 
    <div id="canais"></div> 
</div>

<script>
    const urlLista = "lista.txt"; 
    let imagens = [];
    let slideIndex = 0;
    let primeiroCanal = ""; 

    // Player inicial
    var player = new Clappr.Player({ 
        parentId: "#player", 
        source: "", 
        width: '100%', 
        height: '100%', 
        autoPlay: true,
        mute: true 
    });

    function toggleFullScreen() {
        const p = document.getElementById('player');
        if (!document.fullscreenElement) {
            if (p.requestFullscreen) p.requestFullscreen();
            else if (p.webkitRequestFullscreen) p.webkitRequestFullscreen();
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
        }
    }

    async function carregarTV() {
        try {
            const res = await fetch(urlLista + "?t=" + new Date().getTime());
            const data = await res.text();
            const linhas = data.split('\n');
            const menu = document.getElementById('canais');
            const container = document.getElementById('banner-container');
            
            let nome = "Canal";

            linhas.forEach(l => {
                const linha = l.trim();
                if(linha.startsWith('IMG=')) {
                    const img = document.createElement('img');
                    img.src = linha.replace('IMG=', '');
                    img.className = 'promo-slide';
                    container.appendChild(img);
                    imagens.push(img);
                }
                if(linha.includes("#EXTINF")) { 
                    nome = linha.split(',')[1] || "Canal"; 
                }
                else if(linha.startsWith("http")) {
                    
                    // LÓGICA DO PRIMEIRO CANAL (PROPAGANDAS EM LOOP)
                    if (primeiroCanal === "") {
                        primeiroCanal = linha;
                        player.load({source: primeiroCanal, loop: true}); // Ativa Loop no início
                        player.play();
                    }

                    const div = document.createElement('div');
                    div.className = 'canal';
                    div.innerHTML = "▶️ " + nome;
                    
                    // Captura o link atual para o clique
                    const linkDoCanal = linha;

                    div.onclick = (e) => { 
                        e.stopPropagation();
                        player.setVolume(100); 

                        // Se clicar no primeiro link, ativa o loop. Se for outro, desativa.
                        if (linkDoCanal === primeiroCanal) {
                            player.load({source: linkDoCanal, loop: true});
                        } else {
                            player.load({source: linkDoCanal, loop: false});
                        }

                        player.play(); 
                        if(window.innerWidth < 800) {
                            window.scrollTo({top: 0, behavior: 'smooth'});
                        }
                    };
                    menu.appendChild(div);
                }
            });
            if(imagens.length > 0) showSlides();
        } catch(e) {
            console.error("Erro na carga:", e);
        }
    }

    function showSlides() {
        if (imagens.length === 0) return;
        imagens.forEach(img => img.style.display = "none");
        slideIndex++;
        if (slideIndex > imagens.length) {slideIndex = 1}
        imagens[slideIndex-1].style.display = "block";
        setTimeout(showSlides, 20000); 
    }

    carregarTV();
</script>
</body>
</html>
