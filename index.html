<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV COMUNIDADE</title>
    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: #000; padding: 0; text-align: center; border-bottom: 2px solid #ff9900; }
        
        /* Ajuste do Slide de Propaganda - Agora 100% Funcional */
        #banner-container { 
            position: relative; 
            width: 100%; 
            height: 80px; 
            margin: 0 auto; 
            overflow: hidden; 
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000;
        }

        .promo-slide { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; /* Mantém a proporção sem achatar a imagem */
            display: none; 
            animation: fade 1s; 
        }

        @keyframes fade { from {opacity: .4} to {opacity: 1} }

        #main { display: flex; flex: 1; overflow: hidden; }
        #canais { width: 30%; max-width: 250px; background: #111; overflow-y: auto; }
        .canal { padding: 15px; border-bottom: 1px solid #222; cursor: pointer; font-weight: bold; }
        .canal:hover { background: #ff9900; color: #000; }
        #player { flex: 1; background: #000; }

        @media (max-width: 600px) { 
            #main { flex-direction: column; } 
            #canais { width: 100%; height: 45%; } 
        }
    </style>
</head>
<body>

<header>
    <div id="banner-container">
        </div>
</header>

<div id="main">
    <div id="canais"></div>
    <div id="player"></div>
</div>

<script>
    const urlLista = "lista.txt";
    var player = new Clappr.Player({ parentId: "#player", source: "", width: '100%', height: '100%', autoPlay: true });
    let imagens = [];
    let slideIndex = 0;

   async function carregarTV() {
    try {
        const res = await fetch(urlLista);
        const dados = await res.text();
        const linhas = dados.split('\n');
        const menu = document.getElementById('canais');
        const recipiente = document.getElementById('banner-container');
        
        let nomeAtual = "Canal";
        let logoAtual = "";

        linhas.forEach(linha => {
            const l = linha.trim();

            // Carrossel de Propaganda
            if (l.startsWith('IMG=')) {
                const imgUrl = l.replace('IMG=', '');
                const imagem = document.createElement('img');
                imagem.src = imgUrl;
                imagem.className = 'promo-slide';
                recipiente.appendChild(imagem);
            } 
            // Lógica das Logos e Nomes
            else if (l.includes('#EXTINF:')) {
                const logoMatch = l.match(/tvg-logo="([^"]+)"/);
                logoAtual = logoMatch ? logoMatch[1] : '';
                const partes = l.split(',');
                nomeAtual = partes[partes.length - 1].trim();
            } 
            // Criação do Canal
            else if (l.startsWith('http')) {
                const div = document.createElement('div');
                div.className = 'canal';
                
                const imgTag = logoAtual ? `<img src="${logoAtual}" style="width:30px; height:30px; margin-right:10px; vertical-align:middle; border-radius:4px;">` : '';
                
                div.innerHTML = `${imgTag} <span>${nomeAtual}</span>`;
                
                const linkFinal = l;
                div.onclick = () => {
                    if (player) {
                        player.load({source: linkFinal});
                        player.play();
                    }
                };
                menu.appendChild(div);

                // Reseta para o próximo
                nomeAtual = "Canal";
                logoAtual = "";
            }
        });

        iniciarCarrossel();
    } catch (erro) {
        console.error("Erro ao carregar lista:", erro);
    }
}
            
            if (imagens.length > 0) showSlides();
        } catch (e) {
            console.error("Erro ao carregar a lista:", e);
        }
    }

    function showSlides() {
        if (imagens.length === 0) return;
        imagens.forEach(img => img.style.display = "none");
        slideIndex++;
        if (slideIndex > imagens.length) {slideIndex = 1}
        imagens[slideIndex-1].style.display = "block";
        setTimeout(showSlides, 5000); // Muda a cada 5 segundos
    }
    
    carregarTV();
</script>
</body>
</html>
