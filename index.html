<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha TV Online</title>
    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Estilo do Banner de Propaganda */
        #banner-container { 
            position: relative; 
            width: 100%; 
            height: 80px; 
            background-color: #000; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden;
        }
        .promo-slide { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            display: none; 
            animation: fade 1s; 
        }

        /* Player de Vídeo */
        #player { width: 100%; height: 60vh; background: #111; }

        /* Lista de Canais */
        #canais { 
            padding: 15px; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 10px; 
            max-height: 30vh; 
            overflow-y: auto; 
        }
        .canal { 
            background: #222; 
            padding: 10px; 
            border-radius: 8px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            transition: 0.3s;
            border: 1px solid #333;
        }
        .canal:hover { background: #333; border-color: #deff9a; }
        .canal img { width: 30px; height: 30px; margin-right: 10px; border-radius: 4px; object-fit: cover; }
        .canal span { font-size: 14px; font-weight: bold; }

        @keyframes fade { from { opacity: 0.4; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="banner-container"></div>
    <div id="player"></div>
    <div id="canais"></div>

    <script>
        // --- CONFIGURAÇÃO ---
        const urlLista = "https://raw.githubusercontent.com/SEU_USUARIO/SEU_REPOSITORIO/main/lista.txt"; 
        // 🚨 ATENÇÃO: Substitua o link acima pelo seu link "Raw" do GitHub!

        let player = new Clappr.Player({
            parentId: "#player",
            source: "", // Começa vazio
            width: "100%",
            height: "100%",
            autoPlay: false
        });

        async function carregarTV() {
            try {
                const res = await fetch(urlLista);
                const dados = await res.text();
                const linhas = dados.split('\n');
                const menu = document.getElementById('canais');
                const recipiente = document.getElementById('banner-container');
                
                let nomeAtual = "";
                let logoAtual = "";

                linhas.forEach(linha => {
                    const l = linha.trim();

                    // 1. Carrega Imagens do Carrossel (IMG=...)
                    if (l.startsWith('IMG=')) {
                        const imgUrl = l.replace('IMG=', '');
                        const imagem = document.createElement('img');
                        imagem.src = imgUrl;
                        imagem.className = 'promo-slide';
                        recipiente.appendChild(imagem);
                    } 
                    // 2. Lê Info do Canal (#EXTINF)
                    else if (l.startsWith('#EXTINF:')) {
                        const logoMatch = l.match(/tvg-logo="([^"]+)"/);
                        logoAtual = logoMatch ? logoMatch[1] : "";
                        const partes = l.split(',');
                        nomeAtual = partes[partes.length - 1].trim();
                    } 
                    // 3. Cria botão do Canal (Link HTTP)
                    else if (l.startsWith('http')) {
                        const div = document.createElement('div');
                        div.className = 'canal';
                        
                        const imgTag = logoAtual ? `<img src="${logoAtual}">` : `<img src="https://cdn-icons-png.flaticon.com/512/716/716429.png">`;
                        
                        div.innerHTML = `${imgTag} <span>${nomeAtual || "Canal"}</span>`;
                        
                        const linkVideo = l;
                        div.onclick = () => {
                            player.load({source: linkVideo});
                            player.play();
                        };
                        menu.appendChild(div);

                        // Reseta para o próximo da lista
                        nomeAtual = "";
                        logoAtual = "";
                    }
                });

                iniciarCarrossel();
            } catch (erro) {
                console.error("Erro na missão:", erro);
            }
        }

        // Lógica do Carrossel
        let slideIndex = 0;
        function iniciarCarrossel() {
            const slides = document.getElementsByClassName("promo-slide");
            if (slides.length === 0) return;
            
            for (let i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";
            }
            
            slideIndex++;
            if (slideIndex > slides.length) { slideIndex = 1; }
            
            slides[slideIndex - 1].style.display = "block";
            setTimeout(iniciarCarrossel, 10000); // Troca a cada 10 segundos
        }

        carregarTV();
    </script>
</body>
</html>
