<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha TV Online</title>
    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 0; }
        
        /* Banner de 80px que o senhor aprovou */
        #banner-container { 
            width: 100%; 
            height: 80px; 
            background-color: #000; 
            overflow: hidden; 
            display: flex;
            justify-content: center;
        }
       
.promo-slide { 
    width: 100%; 
    height: 100%; 
    object-fit: cover; /* Isso faz a imagem ocupar todo o espaço de 80px */
    display: none; 
}
        #player { width: 100%; height: 60vh; background: #111; }

        #canais { padding: 20px; display: flex; flex-wrap: wrap; gap: 10px; }
        .canal { 
            background: #222; 
            padding: 15px; 
            border-radius: 5px; 
            cursor: pointer; 
            min-width: 120px; 
            text-align: center;
        }
        .canal:hover { background: #444; }
    </style>
</head>
<body>

    <div id="banner-container"></div>
    <div id="player"></div>
    <div id="canais"></div>

    <script>
        // Use o seu link RAW do GitHub aqui
        const urlLista = "SUA_URL_AQUI"; 

        let player = new Clappr.Player({
            parentId: "#player",
            source: "",
            width: "100%",
            height: "100%"
        });

        async function carregarTV() {
            try {
                const response = await fetch(urlLista);
                const data = await response.text();
                const lines = data.split('\n');
                const menu = document.getElementById('canais');
                const container = document.getElementById('banner-container');
                
                let canalNome = "";

                lines.forEach(line => {
                    const l = line.trim();

                    if (l.startsWith('IMG=')) {
                        const img = document.createElement('img');
                        img.src = l.replace('IMG=', '');
                        img.className = 'promo-slide';
                        container.appendChild(img);
                    } else if (l.startsWith('#EXTINF:')) {
                        canalNome = l.split(',')[1] || "Canal";
                    } else if (l.startsWith('http')) {
                        const btn = document.createElement('div');
                        btn.className = 'canal';
                        btn.innerText = canalNome;
                        btn.onclick = () => {
                            player.load({source: l});
                            player.play();
                        };
                        menu.appendChild(btn);
                    }
                });
                iniciarCarrossel();
            } catch (e) { console.error(e); }
        }

        let slideIdx = 0;
        function iniciarCarrossel() {
            const slides = document.getElementsByClassName("promo-slide");
            for (let i = 0; i < slides.length; i++) slides[i].style.display = "none";
            slideIdx++;
            if (slideIdx > slides.length) slideIdx = 1;
            if (slides[slideIdx-1]) slides[slideIdx-1].style.display = "block";
            setTimeout(iniciarCarrossel, 10000);
        }

        carregarTV();
    </script>
</body>
</html>
