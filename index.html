<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV COMUNIDADE</title>
    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <style>
        /* RESET E PADRÃO DA TELA */
        body { 
            background: #000; 
            color: #fff; 
            font-family: sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }

        header { 
            background: #000; 
            border-bottom: 2px solid #ff9900; 
            height: 120px; 
            display: flex; 
            width: 100%; 
            flex-shrink: 0; 
        }

        #fixo-contato { width: 50%; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 5px; border-right: 1px solid #333; }
        #banner-container { width: 50%; height: 100%; position: relative; overflow: hidden; background: #050505; }
        .promo-slide { height: 100%; width: 100%; display: none; position: absolute; top: 0; left: 0; object-fit: fill; animation: fade 1s; }
        @keyframes fade { from {opacity: .4} to {opacity: 1} }
        
        /* CORPO PRINCIPAL */
        #main { 
            display: flex; 
            flex: 1; 
            flex-direction: column; 
            overflow: hidden; 
        } 

        #player { 
            width: 100%; 
            aspect-ratio: 16 / 9; 
            background: #000; 
            flex-shrink: 0; 
        }

        /* BARRA LATERAL COM ROLAGEM E BOTÃO YOUTUBE */
        #canais { 
            flex: 1; 
            background: #111; 
            overflow-y: auto; 
            display: flex;
            flex-direction: column;
        }

        .btn-youtube {
            background: #ff0000;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            border: none;
            width: 100%;
            font-size: 16px;
            border-bottom: 2px solid #333;
        }
        .btn-youtube:hover { background: #cc0000; }

        .canal { padding: 15px; border-bottom: 1px solid #222; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .canal:hover { background: #ff9900; color: #000; }

        /* MODO TELA CHEIA INTELIGENTE */
        .video-expandido {
            position: fixed !important; top: 0 !important; left: 0 !important;
            width: 100vw !important; height: 100vh !important;
            z-index: 9999; background: #000;
        }

        /* AJUSTE PARA TELAS GRANDES (PC E TV) */
        @media (min-width: 800px) {
            #main { 
                flex-direction: row; 
                height: calc(100vh - 120px); 
            }
            #player { 
                width: 75%; 
                height: 100%; 
            }
            #canais { 
                height: 100%; 
            }
        }
    </style>
</head>
<body>

<header id="cabecalho">
    <div id="fixo-contato">
        <div style="color: #ff9900; font-size: 14px; margin-bottom: 5px; font-weight: bold;">ANUNCIE AQUI</div>
        <div style="color: #25D366; font-size: 18px; font-weight: bold;">📲 (28) 98804-9598</div>
    </div>
    <div id="banner-container"></div>
</header>

<div id="main">
    <div id="player" onclick="toggleSmartFull()"></div> 
    <div id="canais">
        <button class="btn-youtube" onclick="abrirYoutube()">📺 ASSISTIR DO YOUTUBE</button>
        <div id="lista-canais"></div>
    </div> 
</div>

<script>
    const urlLista = "lista.txt"; 
    let imagens = [];
    let slideIndex = 0;
    let listaDeVideos = [];
    let indiceAtual = 0;

    var player = new Clappr.Player({ 
        parentId: "#player", 
        source: "", 
        width: '100%', 
        height: '100%', 
        autoPlay: true,
        mute: true 
    });

    // FUNÇÃO PARA O BOTÃO DO YOUTUBE
    function abrirYoutube() {
        let link = prompt("Cole o link do vídeo do YouTube aqui:");
        if (link) {
            // Converte link normal em link de embed para o Clappr aceitar melhor
            let videoId = "";
            if(link.includes("v=")) videoId = link.split("v=")[1].split("&")[0];
            else if(link.includes("youtu.be/")) videoId = link.split("youtu.be/")[1];
            
            if(videoId) {
                executarCanal({nome: "YouTube", link: link});
            } else {
                alert("Link inválido. Tente copiar o link do vídeo novamente.");
            }
        }
    }

    // LÓGICA DE SOM AUTOMÁTICO SANEADA
    function executarCanal(canalObj) {
        player.load(canalObj.link);
        
        // Se o nome tiver "AUTO", fica mudo. Se não, solta o som!
        if (!canalObj.nome.toUpperCase().includes("AUTO")) {
            player.unmute();
            player.setVolume(100);
        } else {
            player.mute();
        }
        player.play();
    }

    player.on(Clappr.Events.PLAYER_ENDED, function() {
        let canalAtual = listaDeVideos[indiceAtual];
        if (canalAtual && canalAtual.nome.toUpperCase().includes("AUTO")) {
            indiceAtual++;
            if (indiceAtual >= listaDeVideos.length) indiceAtual = 0;
            executarCanal(listaDeVideos[indiceAtual]);
        } else {
            player.play();
        }
    });

    function toggleSmartFull() {
        const p = document.getElementById('player');
        const c = document.getElementById('cabecalho');
        const lista = document.getElementById('canais');
        p.classList.toggle('video-expandido');
        c.style.display = p.classList.contains('video-expandido') ? 'none' : 'flex';
        lista.style.display = p.classList.contains('video-expandido') ? 'none' : 'none'; // Esconde os canais no full
    }

    async function carregarTV() {
        try {
            const res = await fetch(urlLista + "?t=" + new Date().getTime());
            const data = await res.text();
            const linhas = data.split('\n');
            const menu = document.getElementById('lista-canais');
            const container = document.getElementById('banner-container');
            let nomeTemp = "Canal";

            linhas.forEach(l => {
                const linha = l.trim();
                if(linha.startsWith('IMG=')) {
                    const img = document.createElement('img');
                    img.src = linha.replace('IMG=', '');
                    img.className = 'promo-slide';
                    container.appendChild(img);
                    imagens.push(img);
                }
                if(linha.includes("#EXTINF")) { nomeTemp = linha.split(',')[1] || "Canal"; }
                else if(linha.startsWith("http")) {
                    let infoCanal = { nome: nomeTemp, link: linha };
                    listaDeVideos.push(infoCanal);
                    let meuIndice = listaDeVideos.length - 1;

                    if (meuIndice === 0) { player.load(linha); }

                    const div = document.createElement('div');
                    div.className = 'canal';
                    div.innerHTML = "▶️ " + nomeTemp;
                    div.onclick = (e) => { 
                        e.stopPropagation();
                        indiceAtual = meuIndice;
                        executarCanal(infoCanal);
                    };
                    menu.appendChild(div);
                }
            });
            if(imagens.length > 0) showSlides();
        } catch(e) { console.error(e); }
    }

    function showSlides() {
        imagens.forEach(img => img.style.display = "none");
        slideIndex++;
        if (slideIndex > imagens.length) slideIndex = 1;
        imagens[slideIndex-1].style.display = "block";
        setTimeout(showSlides, 10000); 
    }

    carregarTV();
</script>
</body>
</html>
